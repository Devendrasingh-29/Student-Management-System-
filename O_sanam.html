<!DOCTYPE html>
<html>
<head>
    <title>For You Baby</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 50%, #ff758c 100%);
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #ff0066;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .message {
            position: absolute;
            top: 25%;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
            padding: 0 20px;
            box-sizing: border-box;
            display: none; /* shuru me chupana hai */
        }

        .message h1 {
            font-size: 32px;
            text-shadow: 0 0 20px #ff0066, 0 0 40px #ff0066;
            animation: glow 2s ease-in-out infinite;
        }

        .message p {
            font-size: 17px;
            margin-top: 15px;
            line-height: 1.8;
            text-shadow: 0 0 10px white;
        }

        .heart {
            position: absolute;
            color: #ff0066;
            animation: fall 6s linear infinite;
            text-shadow: 0 0 15px #ff0066;
        }

        @keyframes glow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes fall {
            0% { top: -10%; transform: rotate(0deg); opacity: 1; }
            100% { top: 110%; transform: rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <button class="play-btn" onclick="startMagic()">❤️ Tap to Play ❤️</button>

    <audio id="song" loop>
        <source src="o_sanam.mp3" type="audio/mpeg">
    </audio>

    <div class="message" id="msg">
        <h1>For You My Baby ❤️</h1>
        <p>
            Saans leti hu to teri yaad aati hai,<br>
            Aankh band karu to chehra nazar aata hai,<br>
            Duniya maange jannat, mujhe tu hi kaafi hai,<br>
            Tere bina ye dil adhura lagta hai ❤️
        </p>
    </div>

    <script>
        function startMagic() {
            document.getElementById('song').play();
            document.getElementById('msg').style.display = 'block';
            document.querySelector('.play-btn').style.display = 'none';
            setInterval(createHeart, 120);
        }
