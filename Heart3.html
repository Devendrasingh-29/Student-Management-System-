<!DOCTYPE html>
<html>
<head>
    <title>For You Baby</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 50%, #ff758c 100%);
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .message {
            position: absolute;
            top: 25%;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .message h1 {
            font-size: 32px;
            margin: 0;
            text-shadow: 0 0 20px #ff0066, 0 0 40px #ff0066;
            animation: glow 2s ease-in-out infinite;
        }

        .message p {
            font-size: 17px;
            margin-top: 15px;
            line-height: 1.8;
            text-shadow: 0 0 10px white;
        }

        .heart {
            position: absolute;
            color: #ff0066;
            animation: fall 6s linear infinite;
            text-shadow: 0 0 15px #ff0066;
        }

        @keyframes glow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes fall {
            0% {
                top: -10%;
                transform: rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                top: 110%;
                transform: rotate(720deg) scale(0.3);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- SONG: Yaha apna mp3 file ka naam daal dena -->
    <audio autoplay loop>
        <source src="o_sanam.mp3" type="audio/mpeg">
    </audio>

    <div class="message">
        <h1>For You My Baby ❤️</h1>
        <p>
            Saans leti hu to teri yaad aati hai,<br>
            Aankh band karu to chehra nazar aata hai,<br>
            Duniya maange jannat, mujhe tu hi kaafi hai,<br>
            Tere bina ye dil adhura lagta hai ❤️
        </p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 120);
    </script>
</body>
</html>
